# Render Blueprint — deploy TextHero as a single web service that serves the
# built game over HTTPS and the multiplayer lobby over WebSocket on the same URL.
# Dashboard → New → Blueprint → point it at this repo, or create a Web Service
# manually with the same build/start commands.
services:
  - type: web
    name: texthero
    runtime: node
    plan: free
    # --include=dev is required: vite + typescript (devDependencies) do the build
    buildCommand: npm install --include=dev && npm run build
    startCommand: node server/server.mjs
    healthCheckPath: /
    # -- Global leaderboard persistence --------------------------------------
    # Free-tier filesystems are EPHEMERAL: the local SQLite fallback resets on
    # every deploy and idle spin-down. To make the leaderboard durable (free):
    #   1. Create a free Postgres database (e.g. https://neon.tech)
    #   2. Render dashboard -> texthero -> Environment -> add DATABASE_URL
    #      with the database's connection string
    # The server auto-detects DATABASE_URL and switches from SQLite to Postgres.
    # While you're there, also set ADMIN_USER / ADMIN_PASS to replace the
    # defaults that are visible in this public repo.
    #
    # Alternative (paid instance): keep SQLite on a mounted disk instead:
    # disk:
    #   name: texthero-data
    #   mountPath: /var/data
    #   sizeGB: 1
    # envVars:
    #   - key: DATA_DIR
    #     value: /var/data
